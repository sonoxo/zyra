name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Primary deployment is managed by Replit."
          echo "For self-hosted staging, configure deployment target in this step."
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
