name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy"
        required: true
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Primary deployment is managed by Replit Deployments."
          echo "For self-hosted production, configure deployment target in this step."
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
