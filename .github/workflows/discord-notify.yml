name: Discord Notifications

on:
  pull_request:
    types: [opened, closed, merged]
  issues:
    types: [opened]
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR Notification
        if: github.event_name == 'pull_request'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "📝 New PR: ${{ github.event.pull_request.title }}",
                "description": "${{ github.event.pull_request.body }}",
                "url": "${{ github.event.pull_request.html_url }}",
                "color": 5763714,
                "fields": [
                  {"name": "Author", "value": "${{ github.event.pull_request.user.login }}", "inline": true},
                  {"name": "Action", "value": "${{ github.event.action }}", "inline": true}
                ]
              }]
            }'

      - name: Send Issue Notification
        if: github.event_name == 'issues'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🆕 New Issue: ${{ github.event.issue.title }}",
                "description": "${{ github.event.issue.body }}",
                "url": "${{ github.event.issue.html_url }}",
                "color": 15105570
              }]
            }'

      - name: Send Push Notification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deployed to Main",
                "description": "New commit: ${{ github.event.head_commit.message }}",
                "url": "${{ github.event.repository.html_url }}/actions",
                "color": 3066993,
                "fields": [
                  {"name": "Commits", "value": "${{ github.event.commits[0].message }}", "inline": false}
                ]
              }]
            }'
