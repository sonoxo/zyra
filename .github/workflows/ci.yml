name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web (Next.js frontend)
        run: npm run build:web
      
      # Test disabled temporarily - enable after fixing
      # - name: Test
      #   run: npm run test
      
      # API build disabled - handled by Replit deployment
      # - name: Build API
      #   run: npm run build:api
