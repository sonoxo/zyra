version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps):"
    groups:
      production-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "typescript"
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
        update-types:
          - minor
          - patch
      dev-deps:
        patterns:
          - "@types/*"
          - "typescript"
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - automated
    commit-message:
      prefix: "chore(ci):"
